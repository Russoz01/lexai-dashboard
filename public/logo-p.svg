<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <!-- Gradient dourado champagne (mesmo briefing Higgsfield: f5e8d3 → bfa68e → 8a6f55) -->
    <linearGradient id="goldP" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#fff3d6"/>
      <stop offset="35%" stop-color="#e6d4bd"/>
      <stop offset="65%" stop-color="#bfa68e"/>
      <stop offset="100%" stop-color="#8a6f55"/>
    </linearGradient>
    <linearGradient id="goldEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e8d3"/>
      <stop offset="100%" stop-color="#7a5f48"/>
    </linearGradient>
    <!-- Sutil sombra interna pra sensação de relevo metálico -->
    <filter id="goldDepth" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
      <feOffset dx="0.5" dy="1" result="offsetblur"/>
      <feFlood flood-color="#3a2a18" flood-opacity="0.45"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Letter "P" — serif elegant Playfair-style -->
  <g filter="url(#goldDepth)">
    <path
      d="M 56 26
         L 56 174
         L 78 174
         L 78 116
         L 116 116
         C 152 116 174 99 174 71
         C 174 43 152 26 116 26
         Z
         M 78 46
         L 116 46
         C 140 46 152 56 152 71
         C 152 86 140 96 116 96
         L 78 96
         Z"
      fill="url(#goldP)"
      stroke="url(#goldEdge)"
      stroke-width="0.8"
    />
  </g>

  <!-- Balança da justiça embutida no bowl do "P" — escala compacta -->
  <g transform="translate(112, 56) scale(0.32)" stroke="#8a6f55" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="url(#goldP)">
    <!-- Mastro vertical -->
    <line x1="40" y1="0" x2="40" y2="80" stroke="url(#goldEdge)" stroke-width="4"/>
    <!-- Trave horizontal -->
    <line x1="6" y1="14" x2="74" y2="14" stroke="url(#goldEdge)" stroke-width="4"/>
    <!-- Topo (anel/argola) -->
    <circle cx="40" cy="0" r="4" fill="url(#goldEdge)"/>
    <!-- Pratos esquerdo + correntes -->
    <line x1="14" y1="14" x2="14" y2="32" stroke="#8a6f55" stroke-width="1.5"/>
    <path d="M 4 32 L 24 32 L 20 44 L 8 44 Z" fill="url(#goldP)" stroke="url(#goldEdge)" stroke-width="2"/>
    <!-- Pratos direito + correntes -->
    <line x1="66" y1="14" x2="66" y2="32" stroke="#8a6f55" stroke-width="1.5"/>
    <path d="M 56 32 L 76 32 L 72 44 L 60 44 Z" fill="url(#goldP)" stroke="url(#goldEdge)" stroke-width="2"/>
    <!-- Base/pedestal -->
    <line x1="32" y1="80" x2="48" y2="80" stroke="url(#goldEdge)" stroke-width="5" stroke-linecap="square"/>
  </g>
</svg>
