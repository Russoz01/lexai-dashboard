<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Alex AI favicon
       Editorial monogram: cream serif "A" on ink background with gold accent.
       Matches the site design tokens (style.css). -->

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#1A1D17"/>
      <stop offset="100%" stop-color="#2F3328"/>
    </linearGradient>
    <linearGradient id="letter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#F5F2EC"/>
      <stop offset="100%" stop-color="#E8D4AA"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>

  <!-- Subtle top hairline (brand detail) -->
  <rect x="8" y="8" width="48" height="1" fill="#D9BE8A" opacity="0.45"/>

  <!-- Serif "A" — hand-drawn to read clearly at 16x16 -->
  <!-- Left stroke -->
  <path d="M 20 48 L 30 16 L 34 16 L 24 48 Z" fill="url(#letter)"/>
  <!-- Right stroke -->
  <path d="M 30 16 L 34 16 L 44 48 L 40 48 Z" fill="url(#letter)"/>
  <!-- Crossbar -->
  <rect x="25" y="34" width="14" height="3" fill="url(#letter)"/>

  <!-- Gold accent dot (brand mark) -->
  <circle cx="48" cy="48" r="2" fill="#D9BE8A"/>
</svg>
